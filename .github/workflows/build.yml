name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    # 使用 22.04 是因为它的 Python 和系统库最稳定，避免 24.04 的底层冲突
    runs-on: ubuntu-22.04

    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 4. Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev \
            libffi-dev \
            libssl-dev \
            libsqlite3-dev \
            unzip \
            autoconf \
            libtool \
            pkg-config \
            cmake \
            ninja-build

      - name: 5. Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install "cython<3.0.0"
          pip install buildozer virtualenv

      - name: 6. Build Android APK
        # 使用 yes | 自动接受所有安卓 SDK 的条款，防止编译挂起
        run: |
          yes | buildozer android debug
        env:
          # 这一行防止因找不到某些加密库而报错
          PYTHONHTTPSVERIFY: 0

      - name: 7. Upload APK Artifact
        # 强制使用 v4，解决 image_298242.png 中的弃用报错
        uses: actions/upload-artifact@v4
        with:
          name: HealthApp-English-Build
          path: bin/*.apk
          retention-days: 3
