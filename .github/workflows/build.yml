name: Build Android APK

# 触发条件：当你推送代码，或者在网页上手动点击运行
on:
  push:
    branches: [ main, master ]
  workflow_dispatch: 

jobs:
  build:
    # 强制使用稳定的 Ubuntu 22.04，避开最新版系统的依赖冲突
    runs-on: ubuntu-22.04 

    steps:
      - name: 1. 拉取源代码
        uses: actions/checkout@v4

      - name: 2. 配置黄金版本 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. 配置 Java 17 (安卓编译必备)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 4. 安装 Ubuntu 底层 C/C++ 依赖库
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

      - name: 5. 安装 Buildozer 打包工具
        run: |
          pip install --upgrade pip
          pip install buildozer cython virtualenv

      - name: 6. 执行 Buildozer 终极打包 (耗时较长，请耐心)
        run: |
          buildozer android debug

      - name: 7. 上传生成的 APK 安装包
        uses: actions/upload-artifact@v4
        with:
          name: HealthApp-Release  # 下载时的压缩包名字
          path: bin/*.apk          # 提取生成的 apk 文件
